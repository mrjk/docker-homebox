name: CI

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_REPOSITORY: ${{ github.event.repository.name }}
    steps:
      - name: Clone repository
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
          git fetch --tags

      - name: Install Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Setup CI environment
        run: mise x -- task setup

      - name: Show available documentation tasks
        run: mise x -- task docs:list
