name: Release

on:
  # push:
  #   branches:
  #     - main
  #     - dev
  #   tags:
  #     - 'v.*'
  #   paths-ignore:
  #     - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_REPOSITORY: ${{ github.event.repository.name }}
      PAGES_BRANCH: doc-pages
    steps:
      - name: Clone repository
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
          git fetch --tags

      - name: Install Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Setup CI environment
        run: mise x -- task setup

      - name: Run release
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/dev') || startsWith(github.ref, 'refs/tags/v.')
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            export SEMANTIC_RELEASE_PRERELEASE=true
          fi
          mise x -- task release

      - name: Push Docker image(s)
        if: success()
        run: mise x -- task push

      - name: Push latest tag
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v.')
        run: mise x -- task push-latest

      - name: Publish documentation
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v.')
        run: mise x -- task docs:publish

      - name: Update Dockerhub README
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v.')
        run: mise x -- task push-dockerhub-readme
